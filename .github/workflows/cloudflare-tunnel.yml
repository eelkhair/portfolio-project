name: Update Cloudflare Tunnel

on:
  workflow_dispatch:

env:
  CF_API_BASE: https://api.cloudflare.com/client/v4

permissions:
  contents: read

jobs:
  update-tunnel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read tunnel config
        id: config
        run: |
          CONFIG_FILE="deploy/cloudflare/tunnel-config.json"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "::error::Config file not found: $CONFIG_FILE"
            exit 1
          fi
          echo "config=$(cat $CONFIG_FILE | jq -c .)" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────────────────────────────
      # Step 1: Update tunnel ingress configuration
      # ──────────────────────────────────────────────────────────────────────
      - name: Update tunnel ingress rules
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
        run: |
          echo "Building ingress rules from tunnel-config.json..."

          # Build ingress array from config + catch-all 404
          INGRESS=$(echo '${{ steps.config.outputs.config }}' | jq -c '[
            .services[] | { hostname: .hostname, service: .service, originRequest: {} }
          ] + [{ service: "http_status:404" }]')

          BODY=$(jq -n --argjson ingress "$INGRESS" '{ config: { ingress: $ingress } }')

          echo "Pushing $(echo "$INGRESS" | jq length) ingress rules to Cloudflare..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT \
            "$CF_API_BASE/accounts/$CF_ACCOUNT_ID/cfd_tunnel/$CF_TUNNEL_ID/configurations" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Tunnel ingress updated successfully"
          else
            echo "::error::Failed to update tunnel ingress (HTTP $HTTP_CODE)"
            echo "$RESPONSE_BODY" | jq .
            exit 1
          fi

      # ──────────────────────────────────────────────────────────────────────
      # Step 2: Sync DNS CNAME records (multi-zone)
      #
      # Landing-failover guard: the watchdog-dns Worker
      # (deploy/cloudflare/watchdog-worker/) flips landing CNAMEs between
      # <tunnel>.cfargotunnel.com and <project>.pages.dev. We detect an active
      # failover by querying the CURRENT CNAME target: if elkhair.tech points
      # at *.pages.dev, skip landing hostnames in this sync so we don't
      # silently revert an active failover to the (still-dead) tunnel.
      # Everything else in tunnel-config.json syncs normally.
      # ──────────────────────────────────────────────────────────────────────
      - name: Sync DNS CNAME records
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID_TECH: ${{ secrets.CLOUDFLARE_ZONE_ID_TECH }}
          CF_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
        run: |
          TUNNEL_TARGET="${CF_TUNNEL_ID}.cfargotunnel.com"

          # Ask Cloudflare where elkhair.tech currently points. If it's *.pages.dev,
          # the watchdog Worker has failed over and we must not touch landing DNS.
          LANDING_ON_PAGES=0
          CURRENT_TARGET=$(curl -s \
            "$CF_API_BASE/zones/$CF_ZONE_ID_TECH/dns_records?type=CNAME&name=elkhair.tech" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            | jq -r '.result[0].content // empty')
          if [[ "$CURRENT_TARGET" == *.pages.dev ]]; then
            LANDING_ON_PAGES=1
            echo "::warning::Landing CNAME currently points at $CURRENT_TARGET — skipping landing hostnames in DNS sync."
          fi
          # Hostnames owned by the failover script (kept in sync with failover-landing.sh).
          LANDING_HOSTS="elkhair.tech www.elkhair.tech dev.elkhair.tech"

          # Zone mapping: root domain -> zone ID
          declare -A ZONE_MAP
          ZONE_MAP["elkhair.tech"]="$CF_ZONE_ID_TECH"

          # Get all desired hostnames from config
          ALL_HOSTNAMES=$(echo '${{ steps.config.outputs.config }}' | jq -r '.services[].hostname')

          # If landing is failed over, drop landing hostnames from the desired set.
          if [ "$LANDING_ON_PAGES" = "1" ]; then
            for h in $LANDING_HOSTS; do
              ALL_HOSTNAMES=$(echo "$ALL_HOSTNAMES" | grep -vxF "$h" || true)
            done
          fi

          for ROOT_DOMAIN in "${!ZONE_MAP[@]}"; do
            ZONE_ID="${ZONE_MAP[$ROOT_DOMAIN]}"
            echo ""
            echo "══════════════════════════════════════════════"
            echo "Syncing DNS for zone: $ROOT_DOMAIN"
            echo "══════════════════════════════════════════════"

            # Filter hostnames for this zone
            DESIRED_HOSTNAMES=$(echo "$ALL_HOSTNAMES" | grep -E "(^|\.)"${ROOT_DOMAIN}"$")

            if [ -z "$DESIRED_HOSTNAMES" ]; then
              echo "No hostnames for $ROOT_DOMAIN, skipping"
              continue
            fi

            # Get existing tunnel CNAME records for this zone
            echo "Fetching existing DNS records..."
            EXISTING_RECORDS=$(curl -s \
              "$CF_API_BASE/zones/$ZONE_ID/dns_records?type=CNAME&per_page=100" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              | jq -c '[.result[] | select(.content | endswith(".cfargotunnel.com"))]')

            echo "Found $(echo "$EXISTING_RECORDS" | jq length) existing tunnel CNAME records"

            # Create missing CNAME records
            for HOSTNAME in $DESIRED_HOSTNAMES; do
              EXISTS=$(echo "$EXISTING_RECORDS" | jq -r --arg h "$HOSTNAME" '[.[] | select(.name == $h)] | length')
              if [ "$EXISTS" -eq 0 ]; then
                echo "Creating CNAME: $HOSTNAME -> $TUNNEL_TARGET"
                CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
                  -X POST \
                  "$CF_API_BASE/zones/$ZONE_ID/dns_records" \
                  -H "Authorization: Bearer $CF_API_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"type\": \"CNAME\",
                    \"name\": \"$HOSTNAME\",
                    \"content\": \"$TUNNEL_TARGET\",
                    \"proxied\": true,
                    \"comment\": \"Managed by GitHub Actions - Cloudflare Tunnel\"
                  }")

                HTTP_CODE=$(echo "$CREATE_RESPONSE" | tail -1)
                if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                  echo "  Created successfully"
                else
                  echo "::warning::Failed to create CNAME for $HOSTNAME (HTTP $HTTP_CODE)"
                  echo "$CREATE_RESPONSE" | sed '$d' | jq .errors 2>/dev/null || true
                fi
              else
                echo "CNAME exists: $HOSTNAME"
              fi
            done

            # Delete stale tunnel CNAME records (exist in Cloudflare but not in config)
            echo ""
            echo "Checking for stale records..."
            STALE_RECORDS=$(echo "$EXISTING_RECORDS" | jq -c --arg desired "$(echo "$DESIRED_HOSTNAMES" | tr '\n' '|' | sed 's/|$//')" \
              '[.[] | select(.name as $n | ($desired | split("|") | map(select(. == $n))) | length == 0)]')

            STALE_COUNT=$(echo "$STALE_RECORDS" | jq length)
            if [ "$STALE_COUNT" -gt 0 ]; then
              echo "Removing $STALE_COUNT stale tunnel CNAME records..."
              echo "$STALE_RECORDS" | jq -r '.[].id' | while read RECORD_ID; do
                RECORD_NAME=$(echo "$STALE_RECORDS" | jq -r --arg id "$RECORD_ID" '.[] | select(.id == $id) | .name')
                echo "  Deleting: $RECORD_NAME ($RECORD_ID)"
                curl -s -X DELETE \
                  "$CF_API_BASE/zones/$ZONE_ID/dns_records/$RECORD_ID" \
                  -H "Authorization: Bearer $CF_API_TOKEN" > /dev/null
              done
            else
              echo "No stale records to clean up"
            fi
          done

      # ──────────────────────────────────────────────────────────────────────
      # Step 3: Sync WAF block rules (multi-zone)
      # ──────────────────────────────────────────────────────────────────────
      - name: Sync WAF block rules
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID_TECH: ${{ secrets.CLOUDFLARE_ZONE_ID_TECH }}
        run: |
          # Read desired block rules from config
          BLOCK_RULES=$(echo '${{ steps.config.outputs.config }}' | jq -c '.block_rules // []')
          RULE_COUNT=$(echo "$BLOCK_RULES" | jq length)

          if [ "$RULE_COUNT" -eq 0 ]; then
            echo "No block rules defined, skipping WAF sync"
            exit 0
          fi

          declare -A ZONE_MAP
          ZONE_MAP["elkhair.tech"]="$CF_ZONE_ID_TECH"

          for ROOT_DOMAIN in "${!ZONE_MAP[@]}"; do
            ZONE_ID="${ZONE_MAP[$ROOT_DOMAIN]}"
            echo ""
            echo "══════════════════════════════════════════════"
            echo "Syncing $RULE_COUNT WAF block rules for $ROOT_DOMAIN..."
            echo "══════════════════════════════════════════════"

            # Find existing custom WAF ruleset
            RULESETS=$(curl -s \
              "$CF_API_BASE/zones/$ZONE_ID/rulesets" \
              -H "Authorization: Bearer $CF_API_TOKEN")

            RULESET_ID=$(echo "$RULESETS" | jq -r '.result[] | select(.phase == "http_request_firewall_custom") | .id')

            if [ -z "$RULESET_ID" ] || [ "$RULESET_ID" = "null" ]; then
              # No custom ruleset exists — create one with all rules
              echo "Creating new WAF ruleset..."
              RULES_JSON=$(echo "$BLOCK_RULES" | jq -c '[.[] | {description: .description, expression: .expression, action: "block"}]')
              BODY=$(jq -n \
                --argjson rules "$RULES_JSON" \
                '{name: "Portfolio security rules", kind: "zone", phase: "http_request_firewall_custom", rules: $rules}')

              RESPONSE=$(curl -s -w "\n%{http_code}" \
                -X POST \
                "$CF_API_BASE/zones/$ZONE_ID/rulesets" \
                -H "Authorization: Bearer $CF_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$BODY")

              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                echo "Created WAF ruleset with $RULE_COUNT rules"
              else
                echo "::warning::Failed to create WAF ruleset (HTTP $HTTP_CODE)"
                echo "$RESPONSE" | sed '$d' | jq . 2>/dev/null || true
              fi
            else
              # Ruleset exists — sync rules
              echo "Found existing WAF ruleset: $RULESET_ID"

              EXISTING_RULESET=$(curl -s \
                "$CF_API_BASE/zones/$ZONE_ID/rulesets/$RULESET_ID" \
                -H "Authorization: Bearer $CF_API_TOKEN")

              EXISTING_RULES=$(echo "$EXISTING_RULESET" | jq -c '.result.rules // []')

              # Create missing rules
              for i in $(seq 0 $((RULE_COUNT - 1))); do
                DESC=$(echo "$BLOCK_RULES" | jq -r ".[$i].description")
                EXPR=$(echo "$BLOCK_RULES" | jq -r ".[$i].expression")

                HAS_RULE=$(echo "$EXISTING_RULES" | jq --arg d "$DESC" '[.[] | select(.description == $d)] | length')
                if [ "$HAS_RULE" -gt 0 ]; then
                  echo "  Exists: $DESC"
                else
                  echo "  Creating: $DESC"
                  RESPONSE=$(curl -s -w "\n%{http_code}" \
                    -X POST \
                    "$CF_API_BASE/zones/$ZONE_ID/rulesets/$RULESET_ID/rules" \
                    -H "Authorization: Bearer $CF_API_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "$(jq -n --arg desc "$DESC" --arg expr "$EXPR" \
                      '{description: $desc, expression: $expr, action: "block"}')")

                  HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                  if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                    echo "    Created successfully"
                  else
                    echo "::warning::Failed to create rule '$DESC' (HTTP $HTTP_CODE)"
                    echo "$RESPONSE" | sed '$d' | jq .errors 2>/dev/null || true
                  fi
                fi
              done

              # Delete stale rules (in Cloudflare but not in config)
              DESIRED_DESCRIPTIONS=$(echo "$BLOCK_RULES" | jq -r '.[].description')
              echo "$EXISTING_RULES" | jq -c '.[]' | while read -r RULE; do
                RULE_DESC=$(echo "$RULE" | jq -r '.description')
                RULE_ID=$(echo "$RULE" | jq -r '.id')

                if ! echo "$DESIRED_DESCRIPTIONS" | grep -qxF "$RULE_DESC"; then
                  echo "  Deleting stale rule: $RULE_DESC"
                  curl -s -X DELETE \
                    "$CF_API_BASE/zones/$ZONE_ID/rulesets/$RULESET_ID/rules/$RULE_ID" \
                    -H "Authorization: Bearer $CF_API_TOKEN" > /dev/null
                fi
              done
            fi
          done

          echo ""
          echo "WAF sync complete"

      # ──────────────────────────────────────────────────────────────────────
      # Step 4: Configure zone security settings (multi-zone)
      # ──────────────────────────────────────────────────────────────────────
      - name: Configure zone security settings
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID_TECH: ${{ secrets.CLOUDFLARE_ZONE_ID_TECH }}
        run: |
          declare -A ZONE_MAP
          ZONE_MAP["elkhair.tech"]="$CF_ZONE_ID_TECH"

          for ROOT_DOMAIN in "${!ZONE_MAP[@]}"; do
            ZONE_ID="${ZONE_MAP[$ROOT_DOMAIN]}"
            echo ""
            echo "══════════════════════════════════════════════"
            echo "Configuring security for zone: $ROOT_DOMAIN"
            echo "══════════════════════════════════════════════"

            # 1. Security Level → essentially_off
            echo "[1/5] Setting Security Level..."
            RESP=$(curl -s -X PATCH \
              "$CF_API_BASE/zones/$ZONE_ID/settings/security_level" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"value": "essentially_off"}')
            if [ "$(echo "$RESP" | jq -r '.success')" = "true" ]; then
              echo "  Done"
            else
              echo "::warning::Failed to set security_level for $ROOT_DOMAIN: $(echo "$RESP" | jq -r '.errors[0].message // "Unknown"')"
            fi

            # 2. Disable Browser Integrity Check
            echo "[2/5] Disabling Browser Integrity Check..."
            RESP=$(curl -s -X PATCH \
              "$CF_API_BASE/zones/$ZONE_ID/settings/browser_check" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"value": "off"}')
            if [ "$(echo "$RESP" | jq -r '.success')" = "true" ]; then
              echo "  Done"
            else
              echo "::warning::Failed to disable browser_check for $ROOT_DOMAIN: $(echo "$RESP" | jq -r '.errors[0].message // "Unknown"')"
            fi

            # 3. Disable Email Address Obfuscation
            echo "[3/5] Disabling Email Address Obfuscation..."
            RESP=$(curl -s -X PATCH \
              "$CF_API_BASE/zones/$ZONE_ID/settings/email_obfuscation" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"value": "off"}')
            if [ "$(echo "$RESP" | jq -r '.success')" = "true" ]; then
              echo "  Done"
            else
              echo "::warning::Failed to disable email_obfuscation for $ROOT_DOMAIN: $(echo "$RESP" | jq -r '.errors[0].message // "Unknown"')"
            fi

            # 4. Enable Always Use HTTPS
            echo "[4/5] Enabling Always Use HTTPS..."
            RESP=$(curl -s -X PATCH \
              "$CF_API_BASE/zones/$ZONE_ID/settings/always_use_https" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"value": "on"}')
            if [ "$(echo "$RESP" | jq -r '.success')" = "true" ]; then
              echo "  Done"
            else
              echo "::warning::Failed to enable always_use_https for $ROOT_DOMAIN: $(echo "$RESP" | jq -r '.errors[0].message // "Unknown"')"
            fi

            # 5. Enable HSTS
            echo "[5/5] Enabling HSTS..."
            RESP=$(curl -s -X PATCH \
              "$CF_API_BASE/zones/$ZONE_ID/settings/security_header" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"value":{"strict_transport_security":{"enabled":true,"max_age":31536000,"include_subdomains":true,"nosniff":true}}}')
            if [ "$(echo "$RESP" | jq -r '.success')" = "true" ]; then
              echo "  Done"
            else
              echo "::warning::Failed to enable HSTS for $ROOT_DOMAIN: $(echo "$RESP" | jq -r '.errors[0].message // "Unknown"')"
            fi
          done

          echo ""
          echo "Security configuration complete"

      # ──────────────────────────────────────────────────────────────────────
      # Step 5: Verify tunnel health
      # ──────────────────────────────────────────────────────────────────────
      - name: Verify tunnel status
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
        run: |
          TUNNEL_INFO=$(curl -s \
            "$CF_API_BASE/accounts/$CF_ACCOUNT_ID/cfd_tunnel/$CF_TUNNEL_ID" \
            -H "Authorization: Bearer $CF_API_TOKEN")

          STATUS=$(echo "$TUNNEL_INFO" | jq -r '.result.status')
          NAME=$(echo "$TUNNEL_INFO" | jq -r '.result.name')
          CONNECTIONS=$(echo "$TUNNEL_INFO" | jq -r '.result.connections | length')

          echo "══════════════════════════════════════════════"
          echo "Tunnel: $NAME"
          echo "Status: $STATUS"
          echo "Active connections: $CONNECTIONS"
          echo "══════════════════════════════════════════════"

          SERVICE_COUNT=$(echo '${{ steps.config.outputs.config }}' | jq '.services | length')
          echo "Exposed services: $SERVICE_COUNT"
          echo '${{ steps.config.outputs.config }}' | jq -r '.services[].hostname' | while read h; do
            echo "  https://$h"
          done
          echo "══════════════════════════════════════════════"

          if [ "$STATUS" != "healthy" ] && [ "$CONNECTIONS" -eq 0 ]; then
            echo "::warning::Tunnel is not connected. Make sure cloudflared is running on your Proxmox host."
          fi
