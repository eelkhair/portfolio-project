name: Deploy Landing to Cloudflare Pages

# Cold-standby failover for the Proxmox-hosted landing page. Deploys on every
# push to master that touches landing code, so the Pages deployment always
# mirrors what's on Proxmox. Traffic is NOT routed to Pages by default — live
# DNS stays on the Cloudflare Tunnel. During a home ISP outage, run
# deploy/cloudflare/failover-landing.sh cf to flip DNS; run it with `proxmox`
# to flip back.

on:
  push:
    # `master` → production (landing.pages.dev). Any other branch listed here
    # gets a per-branch preview URL (<branch>.landing.pages.dev). Use the
    # `pages` feature branch to validate the whole setup before merging.
    branches: [master, pages]
    paths:
      - 'apps/landing-next/**'
      - '.github/workflows/deploy-landing-cf.yml'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'CF Pages branch to deploy to (master = production, anything else = preview)'
        type: string
        default: ''
        required: false
      clear_npm_cache:
        description: 'Clear npm cache before install (use if builds are sticky)'
        type: boolean
        default: false
        required: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Cloudflare Pages has its own prod environment concept; we don't need a
    # dev/prod split because the project itself has preview vs production
    # deployments based on branch (master = production).
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/landing-next/package-lock.json

      - name: Clear npm cache (opt-in via workflow_dispatch)
        if: inputs.clear_npm_cache == true
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: apps/landing-next
        # `npm install` tolerates lockfile drift during iteration on non-master
        # branches. ⚠ Flip this to `npm ci` before merging to master so CI
        # catches any drift that shouldn't reach production.
        run: npm install --no-audit --no-fund

      - name: Strip Node-only instrumentation before CF build
        working-directory: apps/landing-next
        # `instrumentation.ts` registers @vercel/otel, which relies on Node-only
        # APIs that @cloudflare/next-on-pages can't bundle into the Worker
        # (it fails with "duplicated identifier"). The runtime guard in the
        # file prevents it from executing on edge, but next-on-pages still
        # tries to BUNDLE @vercel/otel, which is what breaks. Removing the
        # file from the CF build avoids the bundler ever seeing it. Proxmox
        # Docker build (deploy-landing.yml) runs a vanilla `next build` and
        # keeps the file, so server-side Next.js render spans continue to
        # flow on the primary landing.
        run: rm -f instrumentation.ts

      - name: Build for Cloudflare Pages
        working-directory: apps/landing-next
        # `NEXT_PUBLIC_*` vars must be present at build time for Next.js to
        # inline them into the client bundle. Match the same values used by
        # the Docker Proxmox build so failover renders identically.
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_FARO_URL: ${{ vars.FARO_URL }}
          NEXT_PUBLIC_FARO_APP_NAME: landing
        run: npm run pages:build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/landing-next
          # Deploy target:
          #   - `inputs.target_branch` if provided via workflow_dispatch
          #   - else `github.ref_name` (e.g. `master` → production,
          #     `pages` → preview at pages.landing.pages.dev)
          # CF Pages treats `master` as the production slot and everything
          # else as a named preview, so failover DNS (which points at the
          # apex landing.pages.dev) stays untouched while we iterate on
          # feature branches.
          command: pages deploy .vercel/output/static --project-name=landing --branch=${{ inputs.target_branch != '' && inputs.target_branch || github.ref_name }}

      - name: Report deployment URL
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "Production deploy: https://landing.pages.dev/ — failover target ready"
          else
            echo "Preview deploy: https://${{ github.ref_name }}.landing.pages.dev/"
          fi
