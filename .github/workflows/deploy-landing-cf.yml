name: Deploy Landing to Cloudflare Pages

# Cold-standby failover for the Proxmox-hosted landing page. Deploys on every
# push to master that touches landing code, so the Pages deployment always
# mirrors what's on Proxmox. Traffic is NOT routed to Pages by default — live
# DNS stays on the Cloudflare Tunnel. During a home ISP outage, run
# deploy/cloudflare/failover-landing.sh cf to flip DNS; run it with `proxmox`
# to flip back.

on:
  push:
    # `master` → production (landing.pages.dev). Any other branch listed here
    # gets a per-branch preview URL (<branch>.landing.pages.dev). Use the
    # `pages` feature branch to validate the whole setup before merging.
    branches: [master, pages]
    paths:
      - 'apps/landing-next/**'
      - '.github/workflows/deploy-landing-cf.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Cloudflare Pages has its own prod environment concept; we don't need a
    # dev/prod split because the project itself has preview vs production
    # deployments based on branch (master = production).
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/landing-next/package-lock.json

      - name: Install dependencies
        working-directory: apps/landing-next
        run: npm ci

      - name: Build for Cloudflare Pages
        working-directory: apps/landing-next
        # `NEXT_PUBLIC_*` vars must be present at build time for Next.js to
        # inline them into the client bundle. Match the same values used by
        # the Docker Proxmox build so failover renders identically.
        env:
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_FARO_URL: ${{ vars.FARO_URL }}
          NEXT_PUBLIC_FARO_APP_NAME: landing
        run: npm run pages:build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/landing-next
          # github.ref_name is the branch name (e.g. `master` or `pages`).
          # CF Pages treats `master` as production and anything else as a
          # preview deployment at <branch>.landing.pages.dev, so failover DNS
          # (pointing at the apex landing.pages.dev) stays untouched while we
          # iterate on the feature branch.
          command: pages deploy .vercel/output/static --project-name=landing --branch=${{ github.ref_name }}

      - name: Report deployment URL
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "Production deploy: https://landing.pages.dev/ — failover target ready"
          else
            echo "Preview deploy: https://${{ github.ref_name }}.landing.pages.dev/"
          fi
