name: Deploy Landing Page

on:
  push:
    branches: [master]
    paths:
      - 'apps/landing-next/**'
      - 'scripts/docker-compose.prod.yml'
      - 'scripts/docker-compose.dev.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options:
          - dev
          - prod
          - both
        default: dev

env:
  REGISTRY: jobboard-registry.elkhair.tech:5000

permissions:
  contents: read

jobs:
  build:
    runs-on: proxmox-dev
    steps:
      - uses: actions/checkout@v5

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build and Push
        run: |
          IMAGE="$REGISTRY/landing:latest"
          echo "Building landing page..."
          docker build \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }} \
            --build-arg NEXT_PUBLIC_FARO_URL=${{ vars.FARO_URL }} \
            --build-arg NEXT_PUBLIC_FARO_APP_NAME=landing \
            -f apps/landing-next/Dockerfile -t $IMAGE apps/landing-next
          echo "Pushing $IMAGE..."
          docker push $IMAGE
          echo "Done"

  deploy-dev:
    needs: build
    if: github.event_name == 'push' || github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
    runs-on: proxmox-dev
    steps:
      - uses: actions/checkout@v5

      - name: Update compose and restart landing container (via docker context to .200)
        env:
          REG_USER: ${{ secrets.REGISTRY_USERNAME }}
          REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -e
          COMPOSE=/tmp/docker-compose.dev.yml
          ENV_FILE=/tmp/.env.dev

          cp scripts/docker-compose.dev.yml "$COMPOSE"
          scp -o StrictHostKeyChecking=accept-new eelkhair@192.168.1.200:~/.env "$ENV_FILE"
          chmod 600 "$ENV_FILE"

          echo "$REG_PASS" | docker --context job-board-dev login ${{ env.REGISTRY }} -u "$REG_USER" --password-stdin
          docker --context job-board-dev pull ${{ env.REGISTRY }}/landing:latest
          docker --context job-board-dev compose -f "$COMPOSE" --env-file "$ENV_FILE" -p job-board up -d --no-deps landing
          docker --context job-board-dev image prune -f || true

          shred -u "$ENV_FILE" 2>/dev/null || rm -f "$ENV_FILE"
          echo "Landing page deployed to dev"

  deploy-prod:
    # Sequential after dev: every push promotes through dev first, then waits
    # at the `prod` GitHub Environment approval gate before deploying prod.
    # `!cancelled()` runs even if dev was skipped via workflow_dispatch=prod-only.
    needs: deploy-dev
    if: |
      !cancelled() && (
        github.event_name == 'push' ||
        github.event.inputs.environment == 'prod' ||
        github.event.inputs.environment == 'both'
      )
    runs-on: proxmox-prod
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - name: Update compose and restart landing container (via docker context to .112)
        env:
          REG_USER: ${{ secrets.REGISTRY_USERNAME }}
          REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -e
          COMPOSE=/tmp/docker-compose.prod.yml
          ENV_FILE=/tmp/.env.prod

          cp scripts/docker-compose.prod.yml "$COMPOSE"
          scp -o StrictHostKeyChecking=accept-new eelkhair@192.168.1.112:~/.env "$ENV_FILE"
          chmod 600 "$ENV_FILE"

          echo "$REG_PASS" | docker --context job-board-prod login ${{ env.REGISTRY }} -u "$REG_USER" --password-stdin
          docker --context job-board-prod pull ${{ env.REGISTRY }}/landing:latest
          docker --context job-board-prod compose -f "$COMPOSE" --env-file "$ENV_FILE" -p job-board up -d --no-deps landing
          docker --context job-board-prod image prune -f || true

          shred -u "$ENV_FILE" 2>/dev/null || rm -f "$ENV_FILE"
          echo "Landing page deployed to prod"
