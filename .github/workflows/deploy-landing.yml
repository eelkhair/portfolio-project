name: Deploy Landing Page

on:
  push:
    branches: [master]
    paths:
      - 'apps/landing-next/**'
      - 'scripts/docker-compose.prod.yml'
      - 'scripts/docker-compose.dev.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options:
          - dev
          - prod
          - both
        default: dev

env:
  REGISTRY: registry.eelkhair.net

permissions:
  contents: read

jobs:
  build:
    runs-on: proxmox-dev
    steps:
      - uses: actions/checkout@v5

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build and Push
        run: |
          IMAGE="$REGISTRY/landing:latest"
          echo "Building landing page..."
          docker build \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.TURNSTILE_SITE_KEY }} \
            -f apps/landing-next/Dockerfile -t $IMAGE apps/landing-next
          echo "Pushing $IMAGE..."
          docker push $IMAGE
          echo "Done"

  deploy-dev:
    needs: build
    if: github.event_name == 'push' || github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
    runs-on: proxmox-dev
    steps:
      - uses: actions/checkout@v5

      - name: Update compose and restart landing container
        env:
          REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REG_PASS" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin
          cp scripts/docker-compose.dev.yml ~/docker-compose.yml
          docker pull ${{ env.REGISTRY }}/landing:latest
          docker compose -f ~/docker-compose.yml -p job-board up -d --no-deps landing
          docker image prune -f || true
          echo "Landing page deployed to dev"

  deploy-prod:
    needs: build
    if: github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'both'
    runs-on: proxmox-prod
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - name: Update compose and restart landing container
        env:
          REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REG_PASS" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin
          cp scripts/docker-compose.prod.yml ~/docker-compose.yml
          docker pull ${{ env.REGISTRY }}/landing:latest
          docker compose -f ~/docker-compose.yml -p job-board up -d --no-deps landing
          docker image prune -f || true
          echo "Landing page deployed to prod"
