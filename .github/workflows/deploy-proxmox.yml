name: Deploy to Proxmox

on:
  push:
    branches: [master]
    paths-ignore:
      - 'apps/landing-next/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options:
          - dev
          - prod
          - both
        default: dev

env:
  REGISTRY: jobboard-registry.elkhair.tech:5000

permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Dev: Build + Deploy (auto — no approval needed)
  # Builds on proxmox-dev runner using local Docker layer cache
  # ════════════════════════════════════════════════════════════════════════════
  build-dev:
    if: github.event_name == 'push' || github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'both'
    runs-on: proxmox-dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: monolith-api
            context: services/monolith
            dockerfile: services/monolith/Src/Presentation/JobBoard.API/Dockerfile
          - name: monolith-mcp
            context: services/monolith
            dockerfile: services/monolith/Src/Presentation/JobBoard.API.Mcp/Dockerfile
          - name: gateway
            context: services/gateway
            dockerfile: services/gateway/Dockerfile
          - name: ai-service-v2
            context: services/ai-service.v2
            dockerfile: services/ai-service.v2/Src/Presentation/JobBoard.AI.API/Dockerfile
          - name: admin-api
            context: services/micro-services/admin-api
            dockerfile: services/micro-services/admin-api/Dockerfile
          - name: admin-api-mcp
            context: services/micro-services/admin-api
            dockerfile: services/micro-services/admin-api/AdminApi.Mcp/Dockerfile
          - name: company-api
            context: services/micro-services/company-api
            dockerfile: services/micro-services/company-api/Dockerfile
          - name: job-api
            context: services/micro-services/job-api
            dockerfile: services/micro-services/job-api/Dockerfile
          - name: user-api
            context: services/micro-services/user-api
            dockerfile: services/micro-services/user-api/Dockerfile
          - name: connector-api
            context: services/connector-api
            dockerfile: services/connector-api/Dockerfile
          - name: reverse-connector-api
            context: services/reverse-connector-api
            dockerfile: services/reverse-connector-api/Dockerfile
          - name: health-check
            context: services/micro-services/HealthChecks
            dockerfile: services/micro-services/HealthChecks/Dockerfile
          - name: keycloak
            context: infrastructure/keycloak
            dockerfile: infrastructure/keycloak/Dockerfile
          - name: job-admin-dev
            context: apps/job-admin
            dockerfile: apps/job-admin/Dockerfile
            build_args: BUILD_CONFIG=development
          - name: job-public-dev
            context: apps/job-public
            dockerfile: apps/job-public/Dockerfile
            build_args: BUILD_CONFIG=development
    steps:
      - uses: actions/checkout@v5

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Prepare NuGet packages for Docker builds
        run: |
          for ctx in \
            services/monolith \
            services/ai-service.v2 \
            services/gateway \
            services/connector-api \
            services/reverse-connector-api \
            services/micro-services/admin-api \
            services/micro-services/company-api \
            services/micro-services/job-api \
            services/micro-services/user-api; do
            cp -r nupkgs "$ctx/nupkgs" 2>/dev/null || true
          done

          find services -name Dockerfile -exec grep -l "mkdir -p /nupkgs" {} \; | while read df; do
            sed -i 's|RUN mkdir -p /nupkgs|COPY nupkgs/ /nupkgs/\nRUN mkdir -p /nupkgs|' "$df"
          done

          find services -name "Nuget.Config" -not -path "*/bin/*" -not -path "*/obj/*" | while read nc; do
            cat > "$nc" << 'NUGETEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="local" value="/nupkgs" />
            </packageSources>
          </configuration>
          NUGETEOF
          done

      - name: Determine image tags
        id: tag
        run: |
          NAME="${{ matrix.name }}"
          # Strip optional -dev suffix from Angular app matrix entries so their tag is :dev too
          BASE_NAME="${NAME%-dev}"
          echo "image=$REGISTRY/${BASE_NAME}:dev" >> $GITHUB_OUTPUT

      - name: Build and Push
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          NAME="${{ matrix.name }}"
          CONTEXT="${{ matrix.context }}"
          DOCKERFILE="${{ matrix.dockerfile }}"
          IMAGE="${{ steps.tag.outputs.image }}"
          BUILD_ARGS="${{ matrix.build_args || '' }}"

          BUILD_CMD="docker build -f $DOCKERFILE"
          if [ -n "$BUILD_ARGS" ]; then
            BUILD_CMD="$BUILD_CMD --build-arg $BUILD_ARGS"
          fi
          # Gateway consumes MAXMIND_LICENSE_KEY to bake the GeoLite2 mmdb
          # into its image. Other services declare no such ARG and silently ignore it.
          if [ "$NAME" = "gateway" ]; then
            BUILD_CMD="$BUILD_CMD --build-arg MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}"
          fi
          BUILD_CMD="$BUILD_CMD -t $IMAGE $CONTEXT"

          echo "🔨 Building $NAME..."
          $BUILD_CMD

          echo "📤 Pushing $IMAGE..."
          docker push $IMAGE

          echo "✅ $NAME done"

  deploy-dev:
    needs: build-dev
    runs-on: proxmox-dev
    steps:
      - uses: actions/checkout@v5

      - name: Deploy dev (via docker context to .200)
        env:
          REG_USER: ${{ secrets.REGISTRY_USERNAME }}
          REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -e
          COMPOSE=/tmp/docker-compose.dev.yml
          ENV_FILE=/tmp/.env.dev

          echo "Staging compose file on runner..."
          cp scripts/docker-compose.dev.yml "$COMPOSE"

          echo "Fetching .env from dev host for compose variable substitution..."
          scp -o StrictHostKeyChecking=accept-new eelkhair@192.168.1.200:~/.env "$ENV_FILE"
          chmod 600 "$ENV_FILE"

          echo "Docker login on remote dev dockerd via context..."
          echo "$REG_PASS" | docker --context job-board-dev login $REGISTRY -u $REG_USER --password-stdin

          echo "Pulling and starting stack on dev..."
          docker --context job-board-dev compose -f "$COMPOSE" --env-file "$ENV_FILE" -p job-board pull
          docker --context job-board-dev compose -f "$COMPOSE" --env-file "$ENV_FILE" -p job-board up -d --remove-orphans

          echo "Cleanup on dev..."
          docker --context job-board-dev image prune -f || true
          docker --context job-board-dev container prune -f || true
          docker --context job-board-dev network prune -f || true

          echo "Cleanup local runner build cache (keep 20GB for layer reuse)..."
          docker builder prune --keep-storage 20gb -f || true

          # Scrub staged .env — runner is shared with prod runner binary on same VM
          shred -u "$ENV_FILE" 2>/dev/null || rm -f "$ENV_FILE"

          echo "dev deploy complete!"

  # ════════════════════════════════════════════════════════════════════════════
  # Prod: Build + Deploy (requires approval via GitHub Environment)
  # Builds on proxmox-prod runner using local Docker layer cache
  # ════════════════════════════════════════════════════════════════════════════
  build-prod:
    needs: deploy-dev
    if: "!cancelled() && (github.event_name == 'push' || github.event.inputs.environment == 'prod' || github.event.inputs.environment == 'both')"
    runs-on: proxmox-prod
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: monolith-api
            context: services/monolith
            dockerfile: services/monolith/Src/Presentation/JobBoard.API/Dockerfile
          - name: monolith-mcp
            context: services/monolith
            dockerfile: services/monolith/Src/Presentation/JobBoard.API.Mcp/Dockerfile
          - name: gateway
            context: services/gateway
            dockerfile: services/gateway/Dockerfile
          - name: ai-service-v2
            context: services/ai-service.v2
            dockerfile: services/ai-service.v2/Src/Presentation/JobBoard.AI.API/Dockerfile
          - name: admin-api
            context: services/micro-services/admin-api
            dockerfile: services/micro-services/admin-api/Dockerfile
          - name: admin-api-mcp
            context: services/micro-services/admin-api
            dockerfile: services/micro-services/admin-api/AdminApi.Mcp/Dockerfile
          - name: company-api
            context: services/micro-services/company-api
            dockerfile: services/micro-services/company-api/Dockerfile
          - name: job-api
            context: services/micro-services/job-api
            dockerfile: services/micro-services/job-api/Dockerfile
          - name: user-api
            context: services/micro-services/user-api
            dockerfile: services/micro-services/user-api/Dockerfile
          - name: connector-api
            context: services/connector-api
            dockerfile: services/connector-api/Dockerfile
          - name: reverse-connector-api
            context: services/reverse-connector-api
            dockerfile: services/reverse-connector-api/Dockerfile
          - name: health-check
            context: services/micro-services/HealthChecks
            dockerfile: services/micro-services/HealthChecks/Dockerfile
          - name: keycloak
            context: infrastructure/keycloak
            dockerfile: infrastructure/keycloak/Dockerfile
          - name: job-admin
            context: apps/job-admin
            dockerfile: apps/job-admin/Dockerfile
            build_args: BUILD_CONFIG=production
          - name: job-public
            context: apps/job-public
            dockerfile: apps/job-public/Dockerfile
            build_args: BUILD_CONFIG=production
    steps:
      - uses: actions/checkout@v5

      - name: Login to private registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login $REGISTRY -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Prepare NuGet packages for Docker builds
        run: |
          for ctx in \
            services/monolith \
            services/ai-service.v2 \
            services/gateway \
            services/connector-api \
            services/reverse-connector-api \
            services/micro-services/admin-api \
            services/micro-services/company-api \
            services/micro-services/job-api \
            services/micro-services/user-api; do
            cp -r nupkgs "$ctx/nupkgs" 2>/dev/null || true
          done

          find services -name Dockerfile -exec grep -l "mkdir -p /nupkgs" {} \; | while read df; do
            sed -i 's|RUN mkdir -p /nupkgs|COPY nupkgs/ /nupkgs/\nRUN mkdir -p /nupkgs|' "$df"
          done

          find services -name "Nuget.Config" -not -path "*/bin/*" -not -path "*/obj/*" | while read nc; do
            cat > "$nc" << 'NUGETEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="local" value="/nupkgs" />
            </packageSources>
          </configuration>
          NUGETEOF
          done

      - name: Determine image tags
        id: tag
        run: |
          NAME="${{ matrix.name }}"
          echo "image=$REGISTRY/${NAME}:prod" >> $GITHUB_OUTPUT

      - name: Build and Push
        env:
          MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
        run: |
          NAME="${{ matrix.name }}"
          CONTEXT="${{ matrix.context }}"
          DOCKERFILE="${{ matrix.dockerfile }}"
          IMAGE="${{ steps.tag.outputs.image }}"
          BUILD_ARGS="${{ matrix.build_args || '' }}"

          BUILD_CMD="docker build -f $DOCKERFILE"
          if [ -n "$BUILD_ARGS" ]; then
            BUILD_CMD="$BUILD_CMD --build-arg $BUILD_ARGS"
          fi
          # Gateway consumes MAXMIND_LICENSE_KEY to bake the GeoLite2 mmdb
          # into its image. Other services declare no such ARG and silently ignore it.
          if [ "$NAME" = "gateway" ]; then
            BUILD_CMD="$BUILD_CMD --build-arg MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY}"
          fi
          BUILD_CMD="$BUILD_CMD -t $IMAGE $CONTEXT"

          echo "🔨 Building $NAME..."
          $BUILD_CMD

          echo "📤 Pushing $IMAGE..."
          docker push $IMAGE

          echo "✅ $NAME done"

  deploy-prod:
    needs: build-prod
    runs-on: proxmox-prod
    environment: prod
    steps:
      - uses: actions/checkout@v5

      - name: Deploy prod (via docker context to .112)
        env:
          REG_USER: ${{ secrets.REGISTRY_USERNAME }}
          REG_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -e
          COMPOSE=/tmp/docker-compose.prod.yml
          ENV_FILE=/tmp/.env.prod

          echo "Staging compose file on runner..."
          cp scripts/docker-compose.prod.yml "$COMPOSE"

          echo "Fetching .env from prod host for compose variable substitution..."
          scp -o StrictHostKeyChecking=accept-new eelkhair@192.168.1.112:~/.env "$ENV_FILE"
          chmod 600 "$ENV_FILE"

          echo "Docker login on remote prod dockerd via context..."
          echo "$REG_PASS" | docker --context job-board-prod login $REGISTRY -u $REG_USER --password-stdin

          echo "Pulling and starting stack on prod..."
          docker --context job-board-prod compose -f "$COMPOSE" --env-file "$ENV_FILE" -p job-board pull
          docker --context job-board-prod compose -f "$COMPOSE" --env-file "$ENV_FILE" -p job-board up -d --remove-orphans

          echo "Cleanup on prod..."
          docker --context job-board-prod image prune -f || true
          docker --context job-board-prod container prune -f || true
          docker --context job-board-prod network prune -f || true

          echo "Cleanup local runner build cache (keep 20GB for layer reuse)..."
          docker builder prune --keep-storage 20gb -f || true

          # Scrub staged .env
          shred -u "$ENV_FILE" 2>/dev/null || rm -f "$ENV_FILE"

          echo "prod deploy complete!"

  # ════════════════════════════════════════════════════════════════════════════
  # Keycloak theme deploy (runs on prod runner — Keycloak lives on .112 outside
  # the job-board compose project. Theme is bind-mounted from
  # /home/eelkhair/EmailTemplates/job-board/. Updates are an rsync + gzip-cache
  # clear: Keycloak's /opt/keycloak/data/tmp/kc-gzip-cache lives in the
  # container's writable layer and is NOT invalidated by `docker restart`.
  # ════════════════════════════════════════════════════════════════════════════
  deploy-keycloak-theme:
    needs: deploy-prod
    if: "!cancelled() && needs.deploy-prod.result == 'success'"
    runs-on: proxmox-prod
    steps:
      - uses: actions/checkout@v5

      - name: Detect theme changes
        id: theme
        run: |
          # Compare HEAD against the previous commit on master. On workflow_dispatch
          # there may be no diff (rerun) — in that case default to syncing anyway
          # since it's idempotent and cheap.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            if git diff --name-only HEAD~1 HEAD | grep -q '^infrastructure/keycloak/themes/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "📝 Theme files changed — will sync"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "⏭️  No theme changes detected"
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 No prior commit to compare — syncing defensively"
          fi

      - name: Rsync theme to .112 + clear gzip cache
        if: steps.theme.outputs.changed == 'true'
        run: |
          set -e

          echo "Rsyncing login theme → /home/eelkhair/EmailTemplates/job-board/..."
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            infrastructure/keycloak/themes/job-board/ \
            eelkhair@192.168.1.112:/home/eelkhair/EmailTemplates/job-board/

          echo "Clearing Keycloak gzip cache (writable-layer, survives docker restart)..."
          ssh eelkhair@192.168.1.112 'docker exec keycloak rm -rf /opt/keycloak/data/tmp/kc-gzip-cache || true'

          echo "Verifying Keycloak still responds..."
          ssh eelkhair@192.168.1.112 \
            'until curl -sf http://localhost:9090/realms/job-board/.well-known/openid-configuration -o /dev/null; do sleep 2; done'

          echo "✅ Keycloak theme deployed"

      - name: Purge Cloudflare edge cache for theme resources
        if: steps.theme.outputs.changed == 'true'
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID_TECH: ${{ secrets.CLOUDFLARE_ZONE_ID_TECH }}
        run: |
          # Keycloak's resource URL hash rarely changes, and CF caches static JS/CSS
          # under auth.elkhair.tech/resources/* for 30 days. Purge by hostname so the
          # next visitor gets the fresh file from origin.
          # NOTE: the API token must include "Zone.Cache Purge" scope on the
          # elkhair.tech zone. If it doesn't, CF returns code 10000
          # "Authentication error". This step is non-fatal — the theme was already
          # rsynced and gzip cache cleared; CF will just serve stale for up to
          # 30 days for cached URLs.
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID_TECH" ]; then
            echo "⚠️  CF_API_TOKEN or CF_ZONE_ID_TECH not set — skipping Cloudflare purge"
            exit 0
          fi
          RESP=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID_TECH}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"hosts":["auth.elkhair.tech"]}')
          echo "$RESP"
          if echo "$RESP" | jq -e '.success == true' >/dev/null; then
            echo "✅ Cloudflare cache purged"
          else
            echo "⚠️  Cloudflare purge failed — token likely missing 'Zone.Cache Purge' scope."
            echo "    Fix: CF Dashboard → My Profile → API Tokens → edit token, add 'Zone > Cache Purge > Purge' for elkhair.tech."
            echo "    Theme files are already synced and Keycloak gzip cache cleared, so origin serves the new file;"
            echo "    CF edge will catch up as its cached entries expire or on manual Dashboard purge."
          fi
