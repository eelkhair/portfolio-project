name: Watchdog — DNS failover (legacy, manual only)

# DEPRECATED: the scheduled probe has moved to a Cloudflare Worker
# (deploy/cloudflare/watchdog-worker/) because GitHub's scheduled workflows
# drifted to ~30 min cadence in practice. This workflow is retained for
# break-glass manual dispatch only — it still works, shares the same state
# file, and can flip DNS if you can't reach the Worker for some reason.
# Safe to delete once the Worker has been live and reliable for a few weeks.

on:
  workflow_dispatch:

concurrency:
  group: watchdog-dns
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  probe-and-failover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Probe and update state
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID_TECH: ${{ secrets.CLOUDFLARE_ZONE_ID_TECH }}
          CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
          PAGES_PROJECT: ${{ secrets.PAGES_PROJECT != '' && secrets.PAGES_PROJECT || 'landing' }}
        run: bash .github/scripts/watchdog-probe.sh

      - name: Commit state if changed
        run: |
          if ! git diff --quiet .github/watchdog-state.json; then
            git config user.email "watchdog-bot@users.noreply.github.com"
            git config user.name  "watchdog-bot"
            git add .github/watchdog-state.json
            git commit -m "watchdog: state update (${GITHUB_RUN_ID})"
            git push
          else
            echo "no state change"
          fi
