name: Watchdog — DNS failover

on:
  schedule:
    # GitHub's effective minimum; scheduled runs drift under load so don't
    # assume sub-5-minute precision.
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: watchdog-dns
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  probe-and-failover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Probe and update state
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID_TECH: ${{ secrets.CLOUDFLARE_ZONE_ID_TECH }}
          CLOUDFLARE_TUNNEL_ID: ${{ secrets.CLOUDFLARE_TUNNEL_ID }}
          PAGES_PROJECT: ${{ secrets.PAGES_PROJECT != '' && secrets.PAGES_PROJECT || 'landing' }}
        run: bash .github/scripts/watchdog-probe.sh

      - name: Commit state if changed
        run: |
          if ! git diff --quiet .github/watchdog-state.json; then
            git config user.email "watchdog-bot@users.noreply.github.com"
            git config user.name  "watchdog-bot"
            git add .github/watchdog-state.json
            git commit -m "watchdog: state update (${GITHUB_RUN_ID})"
            git push
          else
            echo "no state change"
          fi
