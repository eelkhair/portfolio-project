apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: daprConfig
spec:
  tracing:
    samplingRate: "1"
    zipkin:
      endpointAddress: http://localhost:9411/api/v2/spans
    otel:
      endpointAddress: "localhost:4317"
      isSecure: false
      protocol: grpc
  secrets:
    scopes:
      - storeName: vault
        defaultAccess: deny
        allowedSecrets: ["local"]
