apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: daprConfig
spec:
  tracing:
    samplingRate: "1"
    otel:
      endpointAddress: "localhost:4327"
      isSecure: false
      protocol: grpc
  secrets:
    scopes:
      - storeName: vault
        defaultAccess: deny
        allowedSecrets: ["local"]
