apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false

  - name: Elasticsearch
    type: elasticsearch
    uid: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    editable: false
    jsonData:
      timeField: "@timestamp"
      logMessageField: "message"
      logLevelField: "level"
      maxConcurrentShardRequests: 5
      dataLinks:
        - field: "fields.traceId"
          url: "http://localhost:16686/trace/${__value.raw}"
