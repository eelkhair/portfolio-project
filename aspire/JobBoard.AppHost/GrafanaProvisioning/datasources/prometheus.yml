apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # UIDs match prod so dashboards committed under GrafanaDashboards/ work
  # unchanged in Aspire local (no per-env UID rewrites needed).
  - name: Jaeger
    type: jaeger
    uid: ef5fo1p8d0zcwd
    access: proxy
    url: http://jaeger:16686
    editable: false

  - name: Elasticsearch
    type: elasticsearch
    uid: cf5m4qd8jt7uod
    access: proxy
    url: http://elasticsearch:9200
    editable: false
    jsonData:
      timeField: "@timestamp"
      logMessageField: "message"
      logLevelField: "level"
      maxConcurrentShardRequests: 5
      dataLinks:
        - field: "fields.traceId"
          url: "/d/bf5m5dwukfncwd/find-by-trace-id?var-TraceId=${__value.raw}"

  # NOTE: The RUM dashboard (landing-rum) is NOT provisioned in Aspire local.
  # It requires the Infinity datasource (unsigned plugin, needs grafana.com
  # access to install) and the spanmetrics connector needs enough FE traffic
  # to be meaningful. Use the prod Grafana (grafana.eelkhair.net) for RUM.
