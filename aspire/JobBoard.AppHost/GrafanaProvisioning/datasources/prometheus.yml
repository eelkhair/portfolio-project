apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # UIDs match prod so dashboards committed under GrafanaDashboards/ work
  # unchanged in Aspire local (no per-env UID rewrites needed).
  - name: Jaeger
    type: jaeger
    uid: ef5fo1p8d0zcwd
    access: proxy
    url: http://jaeger:16686
    editable: false

  - name: Elasticsearch
    type: elasticsearch
    uid: cf5m4qd8jt7uod
    access: proxy
    url: http://elasticsearch:9200
    editable: false
    jsonData:
      timeField: "@timestamp"
      logMessageField: "message"
      logLevelField: "level"
      maxConcurrentShardRequests: 5
      dataLinks:
        - field: "fields.traceId"
          url: "/d/bf5m5dwukfncwd/find-by-trace-id?var-TraceId=${__value.raw}"

  # NOTE: Infinity datasource (uid infinity-jaeger, used by landing-rum's
  # "Recent traces" panel) is intentionally NOT provisioned here — the plugin
  # has to be downloaded from grafana.com which Aspire's Docker network can't
  # reach during cold start. That one panel will show "datasource not found"
  # in Aspire local; for the same data, open Jaeger directly at
  # http://localhost:16686 (more functional than the panel anyway).
  # In prod/homelab this datasource IS provisioned (grafana has internet).
