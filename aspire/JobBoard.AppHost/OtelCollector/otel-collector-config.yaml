receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
processors:
  filter/dapr:
    error_mode: ignore
    traces:
      span:
        - 'name == "/dapr.proto.runtime.v1.Dapr/GetConfiguration"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/SubscribeConfiguration"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/SaveState"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/GetState"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/DeleteState"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/GetBulkSecret"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/GetSecret"'
        - 'name == "JobBoard.AI.API.Infrastructure.SignalR.AiNotificationHub/OnConnectedAsync"'
        - 'name == "/hubs/notifications/negotiate"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/PublishEvent" and attributes["messaging.destination.name"] == "healthCheckTopic"'
        - 'IsMatch(name, "/v1\\.0/configuration/.*")'
        - 'IsMatch(name, "/v1\\.0/secrets/.*")'
        - 'IsMatch(name, "/v1\\.0/state/.*")'
        - 'IsMatch(name, "/v1\\.0/publish/.*/healthCheckTopic")'
        - 'attributes["url.full"] != nil and attributes["url.full"] == "http://localhost:3500/v1.0/healthz"'
        - 'attributes["user_agent.original"] != nil and IsMatch(attributes["user_agent.original"], "Uptime-Kuma.*")'
        - 'attributes["url.full"] != nil and IsMatch(attributes["url.full"], ".*localhost:9200.*")'
        - 'attributes["url.path"] != nil and attributes["url.path"] == "/dapr/config"'
        - 'attributes["user_agent.original"] != nil and attributes["user_agent.original"] == "Go-http-client/1.1"'
        - 'attributes["url.full"] != nil and IsMatch(attributes["url.full"], ".*/v1/sys/health")'
  # Faro stamps the app environment as `app_environment` / `app.environment` on
  # FE spans. spanmetrics reads `deployment.environment` for its dimension, so
  # copy the Faro value over when a span doesn't already have it set (backend
  # services would get it from their own OTel resource, FE doesn't).
  transform/fe_deployment_env:
    error_mode: ignore
    trace_statements:
      - context: span
        conditions:
          - attributes["deployment.environment"] == nil
        statements:
          - set(attributes["deployment.environment"], attributes["app_environment"]) where attributes["app_environment"] != nil
          - set(attributes["deployment.environment"], attributes["app.environment"]) where attributes["deployment.environment"] == nil and attributes["app.environment"] != nil
          - set(attributes["deployment.environment"], resource.attributes["app_environment"]) where attributes["deployment.environment"] == nil and resource.attributes["app_environment"] != nil
          - set(attributes["deployment.environment"], resource.attributes["app.environment"]) where attributes["deployment.environment"] == nil and resource.attributes["app.environment"] != nil
  batch:
connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [10ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s]
    dimensions:
      - name: http.method
      - name: http.route
      - name: deployment.environment
      - name: geo.country_code
        default: XX
      - name: geo.city
        default: ""
      - name: geo.region
        default: ""
      - name: geo.lat
        default: ""
      - name: geo.lon
        default: ""
    metrics_flush_interval: 15s
    exemplars:
      enabled: true
exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    metric_expiration: 5m
    resource_to_telemetry_conversion:
      enabled: true
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/dapr, transform/fe_deployment_env, batch]
      exporters: [otlp/jaeger, spanmetrics]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [batch]
      exporters: [prometheus]
