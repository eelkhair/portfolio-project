# Drop-in replacement for the OTEL_CONFIG env var on the existing
# `jaeger-otel-collector-1` container on 192.168.1.160.
#
# Diff vs prior version:
#   - NEW: `filter/fe_log_only` — drops Faro `kind=measurement` / `kind=event`
#     records (web-vitals, navigation entries, etc.) from the logs pipelines
#     so Seq + ES only get actual `kind=log` lines (i.e. our pushLog calls).
#   - NEW: `transform/fe_clean_log` — deletes the verbose RUM metadata Faro
#     stamps on every log record (browser_*, sdk_*, session_id, page_url,
#     app_release, view_*, plus the redundant `kind` attribute). Backend
#     Serilog logs don't carry these so the processor is a no-op for them.
#   - Both new processors apply to the `logs` (Seq) AND `logs/es-fe` (ES)
#     pipelines. Order is filter-then-transform so the kind check runs first.
#
# Existing behavior preserved:
#   - `elasticsearch/fe` exporter for frontend logs, separate index
#   - `filter/fe_only` keeps only service.name in (landing, admin-fe, public-fe) on ES
#   - `transform/fe_service_name` copies Faro's `app` → `service.name` for FE
#
# Frontend logs arrive via Alloy's Loki→OTel bridge. Backend (.NET) services
# continue to write directly to Elasticsearch via Serilog sink — they do NOT
# flow through the `logs/es-fe` pipeline (filter excludes non-FE services).
# ES ingest pipeline `fe-otel-to-serilog` remaps field names to match what
# the Find by Trace Id dashboard queries (`fields.TraceId`).
#
# Apply via Portainer: edit the jaeger stack -> OTEL_CONFIG env -> replace
# with this content -> Update the stack.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "https://job-admin.eelkhair.net"
            - "https://job-admin-dev.eelkhair.net"
            - "https://job-admin.elkhair.tech"
            - "https://jobs.elkhair.tech"
            - "https://jobs.eelkhair.net"
            - "https://jobs-dev.eelkhair.net"
            - "https://job.eelkhair.net"
            - "http://localhost:*"
          allowed_headers:
            - "*"

processors:
  filter/dapr:
    error_mode: ignore
    traces:
      span:
        - 'name == "/dapr.proto.runtime.v1.Dapr/GetConfiguration"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/SubscribeConfiguration"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/SaveState"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/GetState"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/DeleteState"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/GetBulkSecret"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/GetSecret"'
        - 'name == "JobBoard.AI.API.Infrastructure.SignalR.AiNotificationHub/OnConnectedAsync"'
        - 'name == "/hubs/notifications/negotiate"'
        - 'name == "/dapr.proto.runtime.v1.Dapr/PublishEvent" and attributes["messaging.destination.name"] == "healthCheckTopic"'
        - 'IsMatch(name, "/v1\\.0/configuration/.*")'
        - 'IsMatch(name, "/v1\\.0/secrets/.*")'
        - 'IsMatch(name, "/v1\\.0/state/.*")'
        - 'IsMatch(name, "/v1\\.0/publish/.*/healthCheckTopic")'
        - 'attributes["url.full"] != nil and attributes["url.full"] == "http://localhost:3500/v1.0/healthz"'
        - 'attributes["user_agent.original"] != nil and IsMatch(attributes["user_agent.original"], "Uptime-Kuma.*")'
        - 'attributes["server.port"] != nil and attributes["server.port"] == 9200'
  # Normalize service name: Alloy's Loki→OTel bridge puts Faro's meta.app.name
  # into the log record as resource.attributes["app"]. Copy it onto the canonical
  # service.name attribute so downstream filters and consumers see it.
  transform/fe_service_name:
    error_mode: ignore
    log_statements:
      - context: resource
        statements:
          - set(attributes["service.name"], attributes["app"]) where attributes["app"] != nil and attributes["service.name"] == nil
  # Route only FE services to the ES logs pipeline so we don't duplicate
  # backend logs that Serilog already writes directly to Elasticsearch.
  filter/fe_only:
    error_mode: ignore
    logs:
      log_record:
        - 'not (resource.attributes["service.name"] == "landing" or resource.attributes["service.name"] == "admin-fe" or resource.attributes["service.name"] == "public-fe")'
  # Faro tags every record with `kind` (log | measurement | event). Drop
  # everything that isn't an actual log line — keeps web-vitals, navigation,
  # and tracing-fetch records out of Seq + ES. Backend logs have no `kind`
  # attribute so they pass through unchanged.
  filter/fe_log_only:
    error_mode: ignore
    logs:
      log_record:
        - 'attributes["kind"] != nil and attributes["kind"] != "log"'
  # Strip the verbose RUM metadata Faro stamps on every log record. Each Seq
  # row currently dumps ~20 attributes (browser, sdk, session, page, view).
  # Keep `app_*`, `service.name`, `geo.*`, and our `context_*` user fields.
  # Backend logs don't carry these attributes so the processor is a no-op
  # for them.
  transform/fe_clean_log:
    error_mode: ignore
    log_statements:
      - context: resource
        statements:
          - delete_matching_keys(attributes, "^browser_")
          - delete_matching_keys(attributes, "^sdk_")
          - delete_matching_keys(attributes, "^view_")
          - delete_key(attributes, "session_id")
          - delete_key(attributes, "page_url")
          - delete_key(attributes, "app_release")
          - delete_key(attributes, "app_bundle_id")
      - context: log
        statements:
          - delete_matching_keys(attributes, "^browser_")
          - delete_matching_keys(attributes, "^sdk_")
          - delete_matching_keys(attributes, "^view_")
          - delete_key(attributes, "session_id")
          - delete_key(attributes, "page_url")
          - delete_key(attributes, "kind")
  batch:

connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [10ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s]
    dimensions:
      - name: http.method
      - name: http.route
      - name: deployment.environment
      - name: geo.country_code
        default: XX
      - name: geo.city
        default: ""
      - name: geo.region
        default: ""
      - name: geo.lat
        default: ""
      - name: geo.lon
        default: ""
    metrics_flush_interval: 15s
    exemplars:
      enabled: true

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlphttp/seq:
    endpoint: https://seq.eelkhair.net/ingest/otlp
  prometheus:
    endpoint: 0.0.0.0:8889
    metric_expiration: 5m
    resource_to_telemetry_conversion:
      enabled: true
  # Frontend Faro logs go here, remapped via ES ingest pipeline to match
  # the Serilog field shape (`fields.TraceId`) the dashboards expect.
  # ES runs in a separate Docker network (kibana-elastic-search_elastic) so
  # we can't resolve it by service name from jaeger_default. Host IP works
  # because ES publishes :9200 on the host.
  elasticsearch/fe:
    endpoints: [http://192.168.1.160:9200]
    logs_index: fe-logs
    pipeline: fe-otel-to-serilog
    mapping:
      mode: raw

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [filter/dapr, batch]
      exporters: [otlp/jaeger, otlphttp/seq, spanmetrics]
    logs:
      receivers: [otlp]
      processors: [filter/fe_log_only, transform/fe_clean_log, batch]
      exporters: [otlphttp/seq]
    logs/es-fe:
      receivers: [otlp]
      processors: [transform/fe_service_name, filter/fe_only, filter/fe_log_only, transform/fe_clean_log, batch]
      exporters: [elasticsearch/fe]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [batch]
      exporters: [prometheus]
