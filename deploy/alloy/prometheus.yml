global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector exposes derived spanmetrics + service metrics on :8889.
  - job_name: "otel-collector"
    static_configs:
      - targets: ["localhost:8889"]

  # Prometheus self-monitoring.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
