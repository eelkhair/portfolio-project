global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Scrape the co-located OTel Collector's Prometheus exporter
scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # Self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
