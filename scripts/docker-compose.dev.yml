services:
  # -- Landing Page (Next.js) ---------------------------------
  landing:
    image: jobboard-registry.elkhair.tech:5000/landing:latest
    ports:
      - "6090:3000"
    environment:
      - FEATURE_FLAGS_URL=http://monolith-api:8080/api/public/feature-flags
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - CONTACT_EMAIL=${CONTACT_EMAIL}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      # OpenTelemetry — HTTP OTLP to the same public collector the Angular apps use.
      # Traces land in Jaeger at jaeger.eelkhair.net tagged service=landing.
      - OTEL_SERVICE_NAME=landing
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://otel.eelkhair.net
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
      # Landing SSR calls gateway for mmdb-backed geo enrichment.
      - GATEWAY_GEO_URL=http://gateway:8080/api/public/geo
    restart: unless-stopped
    networks:
      - ai-job-board-net
  # -- Frontend ----------------------------------------------
  job-admin:
    image: jobboard-registry.elkhair.tech:5000/job-admin:dev
    ports:
      - "6080:80"
    restart: unless-stopped
    networks:
      - ai-job-board-net

  job-public:
    image: jobboard-registry.elkhair.tech:5000/job-public:dev
    ports:
      - "6081:3000"
    restart: unless-stopped
    networks:
      - ai-job-board-net

  # -- Gateway -----------------------------------------------
  gateway:
    image: jobboard-registry.elkhair.tech:5000/gateway:dev
    ports:
      - "5238:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=dev
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
      - JaegerApiUrl=http://192.168.1.160:16686
    networks:
      - ai-job-board-net

  # -- AI Services ------------------------------------------
  ai-service-v2:
    image: jobboard-registry.elkhair.tech:5000/ai-service-v2:dev
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - McpServer__IntegrationUrl=http://monolith-mcp:3333
      - McpServer__MicroUrl=http://admin-api-mcp:3334
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    networks:
      - ai-job-board-net

  ai-service-v2-sidecar:
    image: "daprio/daprd:1.15.8"
    container_name: "ai-service-v2-side-car"
    depends_on:
      - ai-service-v2
    volumes:
      - "/home/eelkhair/Dapr/shared/Components:/Components"
      - "/home/eelkhair/Dapr/ai-service-v2/:/Dapr"
    network_mode: "service:ai-service-v2"
    command: [
      "./daprd",
      "--app-id", "ai-service-v2",
      "--app-port", "8080",
      "--resources-path", "./Components",
      "--resources-path", "./Dapr/Components",
      "--resources-path", "./Dapr/Components/Secrets",
      "--resources-path", "./Dapr/Components/Timers",
      "-config", "./Dapr/Config/config.yaml"
    ]

  # -- Monolith ---------------------------------------------
  monolith-api:
    image: jobboard-registry.elkhair.tech:5000/monolith-api:dev
    ports:
      - "5280:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=dev
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
      - Turnstile__SecretKey=${TURNSTILE_SECRET_KEY}
    networks:
      - ai-job-board-net

  monolith-mcp:
    image: jobboard-registry.elkhair.tech:5000/monolith-mcp:dev
    ports:
      - "3333:3333"
    environment:
      - ASPNETCORE_ENVIRONMENT=dev
      - ASPNETCORE_URLS=http://+:3333
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    networks:
      - ai-job-board-net

  # -- Microservices ----------------------------------------
  admin-api:
    image: jobboard-registry.elkhair.tech:5000/admin-api:dev
    ports:
      - "6062:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
      - Turnstile__SecretKey=${TURNSTILE_SECRET_KEY}
    networks:
      - ai-job-board-net

  admin-api-sidecar:
    image: "daprio/daprd:1.15.8"
    container_name: "admin-api-side-car"
    depends_on:
      - admin-api
    volumes:
      - "/home/eelkhair/Dapr/shared/Components/:/Components"
      - "/home/eelkhair/Dapr/admin-api/:/Dapr"
    network_mode: "service:admin-api"
    command: [
      "./daprd",
      "--app-id", "admin-api",
      "--app-port", "8080",
      "--resources-path", "./Components",
      "--resources-path", "./Dapr/Components",
      "--resources-path", "./Dapr/Components/Secrets",
      "-config", "./Dapr/Config/config.yaml"
    ]

  admin-api-mcp:
    image: jobboard-registry.elkhair.tech:5000/admin-api-mcp:dev
    ports:
      - "3334:3334"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:3334
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    networks:
      - ai-job-board-net

  admin-api-mcp-sidecar:
    image: "daprio/daprd:1.15.8"
    container_name: "admin-api-mcp-side-car"
    depends_on:
      - admin-api-mcp
    volumes:
      - "/home/eelkhair/Dapr/shared/Components/:/Components"
      - "/home/eelkhair/Dapr/admin-api/:/Dapr"
    network_mode: "service:admin-api-mcp"
    command: [
      "./daprd",
      "--app-id", "admin-api-mcp",
      "--app-port", "3334",
      "--resources-path", "./Components",
      "--resources-path", "./Dapr/Components",
      "--resources-path", "./Dapr/Components/Secrets",
      "-config", "./Dapr/Config/config.yaml"
    ]

  company-api:
    image: jobboard-registry.elkhair.tech:5000/company-api:dev
    ports:
      - "6072:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    networks:
      - ai-job-board-net

  company-api-sidecar:
    image: "daprio/daprd:1.15.8"
    container_name: "company-api-side-car"
    depends_on:
      - company-api
    volumes:
      - "/home/eelkhair/Dapr/shared/Components/:/Components"
      - "/home/eelkhair/Dapr/company-api/:/Dapr"
    network_mode: "service:company-api"
    command: [
      "./daprd",
      "--app-id", "company-api",
      "--app-port", "8080",
      "--resources-path", "./Components",
      "--resources-path", "./Dapr/Components/Secrets",
      "-config", "./Dapr/Config/config.yaml"
    ]

  job-api:
    image: jobboard-registry.elkhair.tech:5000/job-api:dev
    ports:
      - "6084:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    networks:
      - ai-job-board-net

  job-api-sidecar:
    image: daprio/daprd:1.15.8
    container_name: job-api-side-car
    depends_on:
      - job-api
    network_mode: "service:job-api"
    volumes:
      - "/home/eelkhair/Dapr/shared/Components/:/Components"
      - "/home/eelkhair/Dapr/job-api/:/Dapr"
    command: [
      "/daprd",
      "--app-id", "job-api",
      "--app-port", "8080",
      "--resources-path", "./Components",
      "--resources-path", "./Dapr/Components",
      "--resources-path", "./Dapr/Components/Secrets",
      "-config", "./Dapr/Config/config.yaml"
    ]

  user-api:
    image: jobboard-registry.elkhair.tech:5000/user-api:dev
    ports:
      - "6092:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    networks:
      - ai-job-board-net

  user-api-sidecar:
    image: "daprio/daprd:1.15.8"
    container_name: "user-api-side-car"
    depends_on:
      - user-api
    volumes:
      - "/home/eelkhair/Dapr/shared/Components:/Components"
      - "/home/eelkhair/Dapr/user-api/:/Dapr"
    network_mode: "service:user-api"
    command: [
      "./daprd",
      "--app-id", "user-api",
      "--app-port", "8080",
      "--resources-path", "./Components",
      "--resources-path", "./Dapr/Components",
      "--resources-path", "./Dapr/Components/Secrets",
      "--resources-path", "./Dapr/Components/Timers",
      "-config", "./Dapr/Config/config.yaml"
    ]

  # -- Connectors -------------------------------------------
  connector-api:
    image: jobboard-registry.elkhair.tech:5000/connector-api:dev
    ports:
      - "5284:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    networks:
      - ai-job-board-net

  connector-api-sidecar:
    image: "daprio/daprd:1.15.8"
    container_name: "connector-api-side-car"
    depends_on:
      - connector-api
    volumes:
      - "/home/eelkhair/Dapr/shared/Components:/Components"
      - "/home/eelkhair/Dapr/connector-api/:/Dapr"
    network_mode: "service:connector-api"
    command: [
      "./daprd",
      "--app-id", "connector-api",
      "--app-port", "8080",
      "--resources-path", "./Components",
      "--resources-path", "./Dapr/Components",
      "--resources-path", "./Dapr/Components/Secrets",
      "--resources-path", "./Dapr/Components/Timers",
      "-config", "./Dapr/Config/config.yaml"
    ]

  reverse-connector-api:
    image: jobboard-registry.elkhair.tech:5000/reverse-connector-api:dev
    ports:
      - "5285:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://192.168.1.160:4317
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=dev
    networks:
      - ai-job-board-net

  reverse-connector-api-sidecar:
    image: "daprio/daprd:1.15.8"
    container_name: "reverse-connector-api-side-car"
    depends_on:
      - reverse-connector-api
    volumes:
      - "/home/eelkhair/Dapr/shared/Components:/Components"
      - "/home/eelkhair/Dapr/reverse-connector-api/:/Dapr"
    network_mode: "service:reverse-connector-api"
    command: [
      "./daprd",
      "--app-id", "reverse-connector-api",
      "--app-port", "8080",
      "--resources-path", "./Components",
      "--resources-path", "./Dapr/Components",
      "--resources-path", "./Dapr/Components/Secrets",
      "--resources-path", "./Dapr/Components/Timers",
      "-config", "./Dapr/Config/config.yaml"
    ]

  # -- Infrastructure ---------------------------------------
  dapr-dashboard:
    image: "daprio/dashboard:latest"
    command: [
      "--docker-compose=true",
      "--components-path", "/Components/",
      "--config-path=/Config",
      "--docker-compose-path=/home/nonroot/docker-compose.yml"
    ]
    ports:
      - "8080:8080"
    volumes:
      - /home/eelkhair/Dapr/shared/Config:/Config:ro
      - /home/eelkhair/docker-compose.yml:/home/nonroot/docker-compose.yml:ro
      - /home/eelkhair/Dapr/_all:/Components:ro
    networks:
      - ai-job-board-net

  job-board-status:
    image: jobboard-registry.elkhair.tech:5000/health-check:dev
    environment:
      - HealthChecksUI__HealthChecks__0__Name=Gateway
      - HealthChecksUI__HealthChecks__0__Uri=http://192.168.1.200:5238/healthzEndpoint
      - HealthChecksUI__HealthChecks__1__Name=AI Service V2
      - HealthChecksUI__HealthChecks__1__Uri=http://192.168.1.200:5200/healthzEndpoint
      - HealthChecksUI__HealthChecks__2__Name=Monolith API
      - HealthChecksUI__HealthChecks__2__Uri=http://192.168.1.200:5280/healthzEndpoint
      - HealthChecksUI__HealthChecks__3__Name=Monolith MCP
      - HealthChecksUI__HealthChecks__3__Uri=http://192.168.1.200:3333/healthzEndpoint
      - HealthChecksUI__HealthChecks__4__Name=Admin API
      - HealthChecksUI__HealthChecks__4__Uri=http://192.168.1.200:6062/healthzEndpoint
      - HealthChecksUI__HealthChecks__5__Name=Admin API MCP
      - HealthChecksUI__HealthChecks__5__Uri=http://192.168.1.200:3334/healthzEndpoint
      - HealthChecksUI__HealthChecks__6__Name=Company API
      - HealthChecksUI__HealthChecks__6__Uri=http://192.168.1.200:6072/healthzEndpoint
      - HealthChecksUI__HealthChecks__7__Name=Job API
      - HealthChecksUI__HealthChecks__7__Uri=http://192.168.1.200:6084/healthzEndpoint
      - HealthChecksUI__HealthChecks__8__Name=User API
      - HealthChecksUI__HealthChecks__8__Uri=http://192.168.1.200:6092/healthzEndpoint
      - HealthChecksUI__HealthChecks__9__Name=Connector API
      - HealthChecksUI__HealthChecks__9__Uri=http://192.168.1.200:5284/healthzEndpoint
      - HealthChecksUI__HealthChecks__10__Name=Reverse Connector API
      - HealthChecksUI__HealthChecks__10__Uri=http://192.168.1.200:5285/healthzEndpoint
    ports:
      - "5107:8080"

networks:
  ai-job-board-net:
    name: ai-job-board-net
